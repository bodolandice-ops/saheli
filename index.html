<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QR Game Pro</title>
    
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root { --primary: #007bff; --success: #22c55e; --danger: #ef4444; --bg: #f4f7f6; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; transition: background 0.2s; }
        .container { max-width: 500px; margin: auto; }
        
        .card { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 20px; }
        h2, h3 { margin-top: 0; color: #1a1a1a; }
        .hidden { display: none; }

        /* Scanning List */
        .qr-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 12px; border-bottom: 1px solid #eee; font-size: 14px;
        }
        .qr-item span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 60%; }

        /* Form Inputs */
        input { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(0,123,255,0.1); }

        /* Buttons */
        .btn { border: none; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; padding: 16px; font-size: 16px; transition: 0.2s; }
        .btn-add { background: var(--primary); color: white; margin-bottom: 15px; }
        .btn-update { background: var(--success); color: white; }
        .btn-pdf { background: #111; color: white; margin-top: 10px; }
        .btn-delete { background: #ffebee; color: var(--danger); padding: 6px 10px; font-size: 12px; border-radius: 6px; width: auto; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Scanner Modal */
        #scanner-modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: black; z-index: 2000; flex-direction: column;
        }
        #reader { width: 100%; flex-grow: 1; }
        .scanner-footer { background: white; padding: 20px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    
    <div id="phase-scan">
        <h2>QR Game 🚀</h2>
        
        <div class="card">
            <h3>Player Info</h3>
            <input type="text" id="userName" placeholder="Full Name" required>
            <input type="tel" id="userPhone" placeholder="Phone Number" required>
        </div>

        <button class="btn btn-add" onclick="openScanner()">+ Scan New QR Code</button>
        
        <div class="card">
            <h3>Scanned Items (<span id="count">0</span>)</h3>
            <div id="list-container">
                <p style="color: #999; text-align: center;">No items scanned yet.</p>
            </div>
            <button class="btn btn-update" id="finish-btn" style="margin-top: 20px;" onclick="uploadToSheet()">Finish & Save Data</button>
        </div>
    </div>

    <div id="phase-finish" class="hidden">
        <div class="card" style="text-align: center;">
            <h2 style="color: var(--success);">Done! ✅</h2>
            <p>Your score has been recorded in our database.</p>
            <div style="background: #f8fafc; padding: 15px; border-radius: 10px; margin-bottom: 15px;">
                <p style="margin: 0; font-size: 14px; color: #64748b;">Total Points Earned</p>
                <h1 id="final-points-display" style="margin: 5px 0; color: var(--success);">0</h1>
            </div>
            <button class="btn btn-pdf" onclick="generateReceiptPDF()">Download PDF Receipt</button>
            <button class="btn" style="background: none; color: #666; margin-top: 10px;" onclick="location.reload()">Start New Session</button>
        </div>
    </div>

</div>

<div id="scanner-modal">
    <div id="reader"></div>
    <div class="scanner-footer">
        <button class="btn" style="background: #eee;" onclick="closeScanner()">Cancel</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby03JDZmbrpHQpTiIcrKHxuPljqpbXWEq3gqNbI5Rb2_UlaSJ748rO7_dIgWCYCyFgddA/exec"; 
    let scannedItems = [];
    let html5QrCode;

    // --- SCANNER LOGIC ---
    async function openScanner() {
        document.getElementById('scanner-modal').style.display = 'flex';
        html5QrCode = new Html5Qrcode("reader");
        const config = { fps: 15, qrbox: { width: 250, height: 250 } };
        
        try {
            await html5QrCode.start({ facingMode: "environment" }, config, (text) => {
                if (scannedItems.includes(text)) {
                    alert("Code already scanned!");
                    return;
                }
                scannedItems.push(text);
                
                // Visual & Audio Feedback
                if (navigator.vibrate) navigator.vibrate(70);
                document.body.style.background = "#dcfce7";
                setTimeout(() => document.body.style.background = "#f4f7f6", 200);

                closeScanner();
                updateUI();
            });
        } catch (err) {
            alert("Camera Error: Please check permissions.");
            closeScanner();
        }
    }

    async function closeScanner() {
        if (html5QrCode && html5QrCode.isScanning) {
            await html5QrCode.stop();
        }
        document.getElementById('scanner-modal').style.display = 'none';
    }

    function updateUI() {
        const listDiv = document.getElementById('list-container');
        document.getElementById('count').innerText = scannedItems.length;
        
        if (scannedItems.length === 0) {
            listDiv.innerHTML = '<p style="color: #999; text-align: center;">No items scanned yet.</p>';
            return;
        }

        listDiv.innerHTML = scannedItems.map((item, i) => `
            <div class="qr-item">
                <span>${item}</span>
                <button class="btn btn-delete" onclick="removeItem(${i})">Remove</button>
            </div>
        `).join('');
    }

    function removeItem(index) {
        scannedItems.splice(index, 1);
        updateUI();
    }

    // --- DATA HANDLING ---
    async function uploadToSheet() {
        const name = document.getElementById('userName').value.trim();
        const phone = document.getElementById('userPhone').value.trim();

        if (!name || !phone) return alert("Please fill in your Name and Phone Number.");
        if (scannedItems.length === 0) return alert("Scan at least one item first.");
        
        const btn = document.getElementById('finish-btn');
        btn.disabled = true;
        btn.innerText = "Syncing...";

        try {
            const data = {
                name: name,
                phone: phone,
                items: scannedItems.join(", "),
                points: scannedItems.length * 10,
                timestamp: new Date().toLocaleString()
            };

            await fetch(SCRIPT_URL, {
                method: "POST",
                mode: "no-cors", 
                body: JSON.stringify(data)
            });
            
            // Show Success Screen
            document.getElementById('final-points-display').innerText = data.points;
            document.getElementById('phase-scan').classList.add('hidden');
            document.getElementById('phase-finish').classList.remove('hidden');
        } catch (e) {
            alert("Sync Failed. Please check connection.");
            btn.disabled = false;
            btn.innerText = "Finish & Save Data";
        }
    }

    // --- PDF GENERATION ---
    function generateReceiptPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const name = document.getElementById('userName').value;
        const phone = document.getElementById('userPhone').value;
        const points = scannedItems.length * 10;

        // Visual Layout
        doc.setFillColor(0, 123, 255);
        doc.rect(0, 0, 210, 45, 'F');
        doc.setTextColor(255, 255, 255);
        doc.setFontSize(26);
        doc.text("PLAYER RECEIPT", 20, 30);

        doc.setTextColor(0, 0, 0);
        doc.setFontSize(12);
        doc.text(`Player: ${name}`, 20, 60);
        doc.text(`Phone: ${phone}`, 20, 70);
        doc.text(`Date: ${new Date().toLocaleDateString()}`, 20, 80);

        // Score Box
        doc.setDrawColor(34, 197, 94);
        doc.setLineWidth(1);
        doc.rect(140, 55, 50, 25);
        doc.text("TOTAL SCORE", 145, 62);
        doc.setFontSize(22);
        doc.setTextColor(34, 197, 94);
        doc.text(`${points}`, 145, 75);

        // Table
        doc.setTextColor(0,0,0);
        doc.setFontSize(10);
        doc.line(20, 90, 190, 90);
        doc.text("ID", 20, 95);
        doc.text("Code Content", 40, 95);
        doc.text("Pts", 175, 95);
        doc.line(20, 98, 190, 98);

        let y = 105;
        scannedItems.forEach((item, i) => {
            doc.text(`${i+1}`, 20, y);
            doc.text(`${item.substring(0, 45)}`, 40, y);
            doc.text("10", 175, y);
            y += 8;
        });

        doc.save(`Score_${name.replace(/\s+/g, '_')}.pdf`);
    }
</script>

</body>
</html>
