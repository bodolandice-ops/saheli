<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QR Game Pro</title>
    
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root { --primary: #007bff; --success: #22c55e; --danger: #ef4444; --bg: #f4f7f6; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 500px; margin: auto; }
        
        /* Cards & UI */
        .card { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 20px; }
        h2, h3 { margin-top: 0; }
        .hidden { display: none; }

        /* Scanning List */
        .qr-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 12px; border-bottom: 1px solid #eee; font-size: 14px;
        }
        .qr-item:last-child { border-bottom: none; }

        /* Form Inputs */
        input { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }

        /* Buttons */
        .btn { border: none; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; padding: 16px; font-size: 16px; transition: 0.2s; }
        .btn-add { background: var(--primary); color: white; margin-bottom: 15px; }
        .btn-update { background: var(--success); color: white; }
        .btn-pdf { background: #111; color: white; margin-top: 10px; }
        .btn-delete { background: #ffebee; color: var(--danger); padding: 6px 10px; font-size: 12px; border-radius: 6px; width: auto; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Scanner Modal */
        #scanner-modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: black; z-index: 2000; flex-direction: column;
        }
        #reader { width: 100%; flex-grow: 1; }
        .scanner-footer { background: white; padding: 20px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    
    <div id="phase-scan">
        <h2>QR 🚀</h2>
        <button class="btn btn-add" onclick="openScanner()">+ Scan New QR Code</button>
        
        <div class="card">
            <h3>Scanned Items (<span id="count">0</span>)</h3>
            <div id="list-container">
                <p style="color: #999; text-align: center;">No items scanned yet.</p>
            </div>
            <button class="btn btn-update" id="finish-btn" style="margin-top: 20px;" onclick="uploadToSheet()">Finish & Save</button>
        </div>
    </div>

    <div id="phase-finish" class="hidden">
        <div class="card">
            <h2 style="color: var(--success);">Sync Complete!</h2>
            <p>Enter details to generate your points receipt.</p>
            <input type="text" id="userName" placeholder="Your Full Name">
            <input type="tel" id="userPhone" placeholder="Phone Number">
            <button class="btn btn-pdf" onclick="generateReceiptPDF()">Download PDF Receipt</button>
            <button class="btn" style="background: none; color: #666;" onclick="location.reload()">Start New Session</button>
        </div>
    </div>

</div>

<div id="scanner-modal">
    <div id="reader"></div>
    <div class="scanner-footer">
        <button class="btn" style="background: #eee;" onclick="closeScanner()">Close Camera</button>
    </div>
</div>

<script>
    // --- CONFIGURATION ---
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxdaTziv4f5kXNRIE9AsKcmQM49bLa0dPOTCATcoF6VvIVjz2WXxfU0dClOHmqZMDKuCw/exec"; 
    let scannedItems = [];
    let html5QrCode;

    // --- SCANNER FUNCTIONS ---
    async function openScanner() {
        document.getElementById('scanner-modal').style.display = 'flex';
        html5QrCode = new Html5Qrcode("reader");
        const config = { fps: 10, qrbox: { width: 250, height: 250 } };
        
        try {
            await html5QrCode.start({ facingMode: "environment" }, config, (text) => {
                scannedItems.push(text);
                if (navigator.vibrate) navigator.vibrate(50);
                closeScanner();
                updateUI();
            });
        } catch (err) {
            alert("Camera Access Denied");
            closeScanner();
        }
    }

    async function closeScanner() {
        if (html5QrCode && html5QrCode.isScanning) {
            await html5QrCode.stop();
        }
        document.getElementById('scanner-modal').style.display = 'none';
    }

    function updateUI() {
        const listDiv = document.getElementById('list-container');
        document.getElementById('count').innerText = scannedItems.length;
        
        if (scannedItems.length === 0) {
            listDiv.innerHTML = '<p style="color: #999; text-align: center;">No items scanned yet.</p>';
            return;
        }

        listDiv.innerHTML = scannedItems.map((item, i) => `
            <div class="qr-item">
                <span style="max-width: 70%; overflow: hidden;">${item}</span>
                <button class="btn btn-delete" onclick="removeItem(${i})">Delete</button>
            </div>
        `).join('');
    }

    function removeItem(index) {
        scannedItems.splice(index, 1);
        updateUI();
    }

    // --- DATA HANDLING ---
    async function uploadToSheet() {
        if (scannedItems.length === 0) return alert("Please scan at least one code.");
        
        const btn = document.getElementById('finish-btn');
        btn.disabled = true;
        btn.innerText = "Syncing with Cloud...";

        try {
            await fetch(SCRIPT_URL, {
                method: "POST",
                mode: "no-cors", // Standard for Apps Script Web Apps
                body: JSON.stringify({ 
                    items: scannedItems,
                    playerName: "System_User", // Will update after PDF screen
                    phone: "System_User"
                })
            });
            
            // Switch Screens
            document.getElementById('phase-scan').classList.add('hidden');
            document.getElementById('phase-finish').classList.remove('hidden');
        } catch (e) {
            alert("Connection Error. Try again.");
            btn.disabled = false;
            btn.innerText = "Finish & Save";
        }
    }

    // --- PDF GENERATION ---
    function generateReceiptPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const name = document.getElementById('userName').value || "Valued Player";
        const phone = document.getElementById('userPhone').value || "N/A";
        const points = scannedItems.length * 10;

        // Branding
        doc.setFillColor(0, 123, 255);
        doc.rect(0, 0, 210, 40, 'F');
        doc.setTextColor(255, 255, 255);
        doc.setFontSize(24);
        doc.text("GAME RECEIPT", 20, 25);

        // Player Info Box
        doc.setTextColor(0, 0, 0);
        doc.setFontSize(12);
        doc.text(`Player Name: ${name}`, 20, 55);
        doc.text(`Phone Number: ${phone}`, 20, 65);
        doc.text(`Date Issued: ${new Date().toLocaleDateString()}`, 20, 75);

        // Score
        doc.setDrawColor(34, 197, 94);
        doc.setLineWidth(1);
        doc.rect(140, 50, 50, 25);
        doc.text("TOTAL SCORE", 145, 58);
        doc.setFontSize(18);
        doc.setTextColor(34, 197, 94);
        doc.text(`${points} PTS`, 145, 68);

        // Items Table
        doc.setTextColor(0,0,0);
        doc.setFontSize(12);
        doc.line(20, 85, 190, 85);
        doc.text("No.", 20, 92);
        doc.text("Scanned Content", 40, 92);
        doc.text("Points", 170, 92);
        doc.line(20, 95, 190, 95);

        let y = 105;
        scannedItems.forEach((item, i) => {
            doc.setFontSize(10);
            doc.text(`${i+1}`, 20, y);
            doc.text(`${item.substring(0, 45)}`, 40, y);
            doc.text("10", 175, y);
            y += 10;
        });

        doc.save(`Receipt_${name}.pdf`);
    }
</script>

</body>
</html>
