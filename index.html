<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QR Scanner Pro</title>
    
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root { --primary: #007bff; --success: #22c55e; --danger: #ef4444; --bg: #f4f7f6; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 500px; margin: auto; }
        .card { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 20px; }
        h2, h3 { margin-top: 0; color: #1a1a1a; }
        .hidden { display: none; }

        /* List Styling */
        .qr-item { 
            display: flex; justify-content: space-between; align-items: flex-start; 
            padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; gap: 10px;
        }
        .qr-item span { word-break: break-all; white-space: normal; flex-grow: 1; line-height: 1.4; }
        .price-tag { color: var(--success); font-weight: bold; min-width: 70px; text-align: right; }

        /* Inputs & Buttons */
        input { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box; outline: none; }
        .btn { border: none; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; padding: 16px; font-size: 16px; transition: 0.2s; }
        .btn-add { background: var(--primary); color: white; margin-bottom: 15px; }
        .btn-update { background: var(--success); color: white; }
        .btn-pdf { background: #111; color: white; margin-top: 10px; }
        .btn-delete { background: #ffebee; color: var(--danger); padding: 8px 12px; font-size: 12px; border-radius: 6px; width: auto; }

        /* Scanner */
        #scanner-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 2000; flex-direction: column; }
        #reader { width: 100%; flex-grow: 1; }
        .scanner-footer { background: white; padding: 20px; text-align: center; }
        .scan-feedback { 
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(34, 197, 94, 0.9); color: white; padding: 10px 20px;
            border-radius: 20px; font-weight: bold; display: none; z-index: 2001;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="phase-scan">
        <h2>QR Inventory 🚀</h2>
        <div class="card">
            <h3>User Details</h3>
            <input type="text" id="userName" placeholder="Full Name">
            <input type="tel" id="userPhone" placeholder="Phone Number">
        </div>

        <button class="btn btn-add" onclick="openScanner()">+ Start Continuous Scan</button>
        
        <div class="card">
            <h3>Scanned Items (<span id="count">0</span>)</h3>
            <div id="list-container">
                <p style="color: #999; text-align: center;">Ready to scan.</p>
            </div>
            <button class="btn btn-update" id="finish-btn" style="margin-top: 20px;" onclick="uploadToSheet()">Sync to Sheet & Finish</button>
        </div>
    </div>

    <div id="phase-finish" class="hidden">
        <div class="card" style="text-align: center;">
            <h2 style="color: var(--success);">Data Synced! ✅</h2>
            <div style="background: #f8fafc; padding: 15px; border-radius: 10px; margin-bottom: 15px;">
                <p style="margin: 0; font-size: 14px; color: #64748b;">Total Bill Amount</p>
                <h1 id="final-price-display" style="margin: 5px 0; color: var(--success);">$0.00</h1>
            </div>
            <button class="btn btn-pdf" onclick="generateReceiptPDF()">Download PDF Receipt</button>
            <button class="btn" style="background: none; color: #666; margin-top: 10px;" onclick="location.reload()">Start New Session</button>
        </div>
    </div>
</div>

<div id="scanner-modal">
    <div id="scan-feedback" class="scan-feedback">Item Captured!</div>
    <div id="reader"></div>
    <div class="scanner-footer">
        <button class="btn" style="background: #eee;" onclick="closeScanner()">Stop Scanning</button>
    </div>
</div>

<script>
    // PUT YOUR DEPLOYED URL HERE
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzuh6d-oO5bgJveBdGcHTqreAsh8rBrZC6arwTc-Tn4cZtJb7qjltbv5yPBiW4HR2Qf4Q/exec"; 
    
    let scannedItems = [];
    let html5QrCode;
    let isProcessing = false;

    // Helper: Finds price in QR text
    function extractPrice(text) {
        const regex = /(\d+(\.\d{1,2})?)/; 
        const match = text.match(regex);
        return match ? parseFloat(match[0]) : 0.00;
    }

    async function openScanner() {
        document.getElementById('scanner-modal').style.display = 'flex';
        html5QrCode = new Html5Qrcode("reader");
        try {
            await html5QrCode.start({ facingMode: "environment" }, { fps: 20, qrbox: 250 }, (text) => {
                if (isProcessing) return;
                isProcessing = true;

                const price = extractPrice(text);
                scannedItems.push({ content: text, price: price });
                
                showFeedback();
                if (navigator.vibrate) navigator.vibrate(70);
                updateUI();
                setTimeout(() => { isProcessing = false; }, 1200);
            });
        } catch (err) { alert("Camera Error"); closeScanner(); }
    }

    function showFeedback() {
        const fb = document.getElementById('scan-feedback');
        fb.style.display = 'block';
        setTimeout(() => { fb.style.display = 'none'; }, 800);
    }

    async function closeScanner() {
        if (html5QrCode && html5QrCode.isScanning) { await html5QrCode.stop(); await html5QrCode.clear(); }
        document.getElementById('scanner-modal').style.display = 'none';
    }

    function updateUI() {
        const listDiv = document.getElementById('list-container');
        document.getElementById('count').innerText = scannedItems.length;
        if (scannedItems.length === 0) return;

        listDiv.innerHTML = scannedItems.map((item, i) => `
            <div class="qr-item">
                <span><strong>#${i+1}</strong> ${item.content}</span>
                <span class="price-tag">$${item.price.toFixed(2)}</span>
                <button class="btn btn-delete" onclick="removeItem(${i})">Remove</button>
            </div>
        `).reverse().join('');
    }

    function removeItem(index) {
        const actualIndex = (scannedItems.length - 1) - index;
        scannedItems.splice(actualIndex, 1);
        updateUI();
    }

    async function uploadToSheet() {
        const name = document.getElementById('userName').value.trim();
        const phone = document.getElementById('userPhone').value.trim();

        if (!name || scannedItems.length === 0) return alert("Please provide Name and scan items.");
        
        const btn = document.getElementById('finish-btn');
        btn.disabled = true;
        btn.innerText = "Uploading Rows...";

        const total = scannedItems.reduce((sum, item) => sum + item.price, 0);

        try {
            // Sending the actual array so Google Script can loop through it
            await fetch(SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify({
                    name: name,
                    phone: phone,
                    items: scannedItems
                })
            });

            document.getElementById('final-price-display').innerText = `$${total.toFixed(2)}`;
            document.getElementById('phase-scan').classList.add('hidden');
            document.getElementById('phase-finish').classList.remove('hidden');
        } catch (e) {
            alert("Upload Failed. Check Connection.");
            btn.disabled = false;
        }
    }

    function generateReceiptPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const name = document.getElementById('userName').value;
        const total = scannedItems.reduce((sum, item) => sum + item.price, 0);

        // Styling
        doc.setFillColor(40, 44, 52);
        doc.rect(0, 0, 210, 40, 'F');
        doc.setTextColor(255, 255, 255);
        doc.setFontSize(22);
        doc.text("OFFICIAL RECEIPT", 20, 25);

        doc.setTextColor(0, 0, 0);
        doc.setFontSize(10);
        doc.text(`Customer Name: ${name}`, 20, 50);
        doc.text(`Date/Time: ${new Date().toLocaleString()}`, 20, 56);

        // Table Header
        doc.line(20, 65, 190, 65);
        doc.setFont(undefined, 'bold');
        doc.text("SN", 20, 70);
        doc.text("Description (QR Data)", 40, 70);
        doc.text("Price", 175, 70, { align: 'right' });
        doc.setFont(undefined, 'normal');
        doc.line(20, 73, 190, 73);

        let y = 82;
        scannedItems.forEach((item, i) => {
            if (y > 275) { doc.addPage(); y = 20; }
            
            doc.text(`${i+1}`, 20, y);
            const splitContent = doc.splitTextToSize(item.content, 120);
            doc.text(splitContent, 40, y);
            doc.text(`$${item.price.toFixed(2)}`, 175, y, { align: 'right' });
            
            y += (splitContent.length * 6) + 4;
            doc.setDrawColor(240);
            doc.line(20, y-2, 190, y-2);
        });

        // Summary
        y += 10;
        doc.setFontSize(14);
        doc.setFont(undefined, 'bold');
        doc.text("GRAND TOTAL:", 120, y);
        doc.setTextColor(34, 197, 94);
        doc.text(`$${total.toFixed(2)}`, 175, y, { align: 'right' });

        doc.save(`Receipt_${name.replace(/\s+/g, '_')}.pdf`);
    }
</script>

</body>
</html>
