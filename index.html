<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QR Quest Mobile</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        :root { --primary: #00ff88; --bg: #1a1a1a; }
        
        body { 
            margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg); color: white; overflow: hidden; touch-action: manipulation;
        }

        /* Full-screen Camera Container */
        #container { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; }

        #video { width: 100%; height: 100%; object-fit: cover; }

        /* UI Overlays */
        .overlay {
            position: absolute; left: 0; right: 0; z-index: 10;
            background: rgba(0,0,0,0.6); padding: 15px; text-align: center;
        }
        
        .top-bar { top: 0; border-bottom: 1px solid var(--primary); }
        .bottom-bar { bottom: 0; padding-bottom: 30px; border-top: 1px solid var(--primary); }

        input {
            width: 80%; padding: 12px; border-radius: 8px; border: none;
            margin-bottom: 10px; font-size: 16px; /* Prevents iOS zoom on focus */
        }

        /* Scanner Target Box */
        #target {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 250px; height: 250px;
            border: 2px solid var(--primary);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
            border-radius: 20px;
            pointer-events: none;
            z-index: 5;
        }

        .scanning-line {
            width: 100%; height: 2px; background: var(--primary);
            position: absolute; top: 0; animation: scan 2s infinite linear;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }

        #status { font-weight: bold; color: var(--primary); margin-top: 10px; }
    </style>
</head>
<body>

<div id="container">
    <div class="overlay top-bar">
        <input type="text" id="playerName" placeholder="Enter Nickname...">
    </div>

    <div id="target"><div class="scanning-line"></div></div>
    
    <video id="video"></video>
    <canvas id="canvas" hidden></canvas>

    <div class="overlay bottom-bar">
        <div id="status">Align QR Code inside the square</div>
    </div>
</div>

<script>
    const video = document.getElementById("video");
    const canvas = document.body.appendChild(document.createElement("canvas"));
    const ctx = canvas.getContext("2d");
    const status = document.getElementById("status");
    const SCRIPT_URL = "YOUR_GOOGLE_APPS_SCRIPT_URL_HERE";

    let lastScannedCode = "";
    let isProcessing = false;

    // Mobile Camera Setup
    navigator.mediaDevices.getUserMedia({ 
        video: { facingMode: "environment", focusMode: "continuous" } 
    }).then(stream => {
        video.srcObject = stream;
        video.setAttribute("playsinline", true);
        video.play();
        requestAnimationFrame(tick);
    });

    function tick() {
        if (video.readyState === video.HAVE_ENOUGH_DATA && !isProcessing) {
            canvas.height = video.videoHeight;
            canvas.width = video.videoWidth;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const code = jsQR(imageData.data, imageData.width, imageData.height);

            if (code && code.data !== lastScannedCode) {
                lastScannedCode = code.data;
                handleMatch(code.data);
            }
        }
        requestAnimationFrame(tick);
    }

    async function handleMatch(data) {
        isProcessing = true;
        const name = document.getElementById("playerName").value || "Player 1";
        status.innerText = "🚀 TRANSMITTING DATA...";
        
        // Haptic Feedback (Vibrate phone)
        if (navigator.vibrate) navigator.vibrate(200);

        try {
            await fetch(SCRIPT_URL, {
                method: "POST",
                mode: 'no-cors', // Essential for Google Apps Script 
                body: JSON.stringify({ qrData: data, playerName: name })
            });
            status.innerText = "✅ RECORDED: " + data;
        } catch (e) {
            status.innerText = "❌ Sync Failed";
        }

        // Wait 3 seconds before allowing next scan to prevent duplicates
        setTimeout(() => { 
            isProcessing = false; 
            status.innerText = "Ready for next scan...";
        }, 3000);
    }
</script>

</body>
</html>
